<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Email Signature Generator</title>

  <style>
    body {
      margin: 0;
      padding: 30px;
      background: #ffffff;
      color: #000000;
      font-family: Arial, Helvetica, sans-serif;
    }

    .generator-container {
      width: 100%;
      max-width: 600px;
    }

    .generator-container h2 {
      margin: 0 0 24px;
      font-size: 24px;
    }

    .form-group {
      margin-bottom: 15px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 700;
    }

    .form-group input[type="text"],
    .form-group input[type="tel"] {
      display: block;
      width: 320px;
      max-width: 100%;
      padding: 8px;
      border: 1px solid #888888;
      background: #ffffff;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 14px;
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 9px;
      width: 340px;
      max-width: 100%;
      margin: 8px 0 20px;
    }

    .checkbox-row input {
      flex: 0 0 auto;
      width: 16px;
      height: 16px;
      margin: 0;
      cursor: pointer;
    }

    .checkbox-row label {
      margin: 0;
      font-size: 14px;
      font-weight: 700;
      line-height: 1.4;
      cursor: pointer;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 10px;
    }

    button {
      width: 180px;
      padding: 9px 12px;
      border: 1px solid #888888;
      background: #f3f3f3;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 14px;
      cursor: pointer;
    }

    button:hover {
      background: #e8e8e8;
    }

    #signatureOutput {
      display: inline-block;
      width: auto;
      max-width: 100%;
      margin-top: 30px;
      padding: 20px;
      overflow-x: auto;
      border: 1px solid #cccccc;
      background: #ffffff;
      box-sizing: border-box;
    }

    @media screen and (max-width: 550px) {
      body {
        padding: 16px;
      }

      #signatureOutput {
        padding: 8px;
      }
    }
  </style>
</head>

<body>

  <main class="generator-container">

    <h2>Email Signature Generator</h2>

    <div class="form-group">
      <label for="name">Name</label>

      <input
        id="name"
        type="text"
        placeholder="John Smith"
      >
    </div>

    <div class="form-group">
      <label for="title">Job Title</label>

      <input
        id="title"
        type="text"
        placeholder="Supervisor"
      >
    </div>

    <div class="form-group">
      <label for="extension">Extension</label>

      <input
        id="extension"
        type="text"
        inputmode="numeric"
        placeholder="1000"
      >
    </div>

    <div class="form-group">
      <label for="cell">Cell</label>

      <input
        id="cell"
        type="tel"
        placeholder="+1(818) 555-1234"
      >
    </div>

    <div class="form-group">
      <label for="fax">Fax</label>

      <input
        id="fax"
        type="tel"
        placeholder="+1(800) 555-9876"
      >
    </div>

    <div class="checkbox-row">
      <input
        id="includeConfidentiality"
        type="checkbox"
      >

      <label for="includeConfidentiality">
        Include confidentiality notice
      </label>
    </div>

    <div class="button-row">
      <button
        type="button"
        onclick="generateSignature()"
      >
        Generate Signature
      </button>

      <button
        type="button"
        onclick="copySignature()"
      >
        Copy Signature
      </button>
    </div>

    <div id="signatureOutput"></div>

  </main>

  <script>
    const SIGNATURE_WIDTH = 470;

    function escapeHTML(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function formatPhoneNumber(value) {
      const digits = String(value).replace(/\D/g, "");

      if (!digits) {
        return "";
      }

      let phoneDigits = digits;

      if (
        phoneDigits.length === 11 &&
        phoneDigits.startsWith("1")
      ) {
        phoneDigits = phoneDigits.substring(1);
      }

      if (phoneDigits.length !== 10) {
        return value;
      }

      return (
        "+1(" +
        phoneDigits.substring(0, 3) +
        ") " +
        phoneDigits.substring(3, 6) +
        "-" +
        phoneDigits.substring(6)
      );
    }

    function generateSignature() {
      const nameValue =
        document.getElementById("name").value.trim() ||
        "John Smith";

      const titleValue =
        document.getElementById("title").value.trim() ||
        "Supervisor";

      const extensionValue =
        document.getElementById("extension").value.trim();

      const cellValue = formatPhoneNumber(
        document.getElementById("cell").value.trim()
      );

      const faxValue = formatPhoneNumber(
        document.getElementById("fax").value.trim()
      );

      const includeConfidentiality =
        document.getElementById(
          "includeConfidentiality"
        ).checked;

      const name = escapeHTML(nameValue);
      const title = escapeHTML(titleValue);
      const extension = escapeHTML(extensionValue);
      const cell = escapeHTML(cellValue);
      const fax = escapeHTML(faxValue);

      let phoneLine = "+1(800) 423-2341";

      if (extension) {
        phoneLine += " | Ext. " + extension;
      }

      let optionalPhoneRows = "";

      if (cell) {
        optionalPhoneRows += `
          <tr>
            <td style="
              padding:0;
              font-family:Arial,Helvetica,sans-serif;
              font-size:16px;
              line-height:20px;
              color:#000000;
              white-space:nowrap;
            ">
              Cell: ${cell}
            </td>
          </tr>
        `;
      }

      if (fax) {
        optionalPhoneRows += `
          <tr>
            <td style="
              padding:0;
              font-family:Arial,Helvetica,sans-serif;
              font-size:16px;
              line-height:20px;
              color:#000000;
              white-space:nowrap;
            ">
              Fax: ${fax}
            </td>
          </tr>
        `;
      }

      let confidentialityRow = "";

      if (includeConfidentiality) {
        confidentialityRow = `
          <tr>
            <td
              colspan="7"
              width="${SIGNATURE_WIDTH}"
              style="
                width:${SIGNATURE_WIDTH}px;
                padding:8px 0 0 0;
                vertical-align:top;
              "
            >
              <table
                width="${SIGNATURE_WIDTH}"
                cellpadding="0"
                cellspacing="0"
                border="0"
                role="presentation"
                style="
                  width:${SIGNATURE_WIDTH}px;
                  border-collapse:collapse;
                  border-spacing:0;
                  table-layout:fixed;
                "
              >
                <tr>
                  <td
                    width="${SIGNATURE_WIDTH}"
                    style="
                      width:${SIGNATURE_WIDTH}px;
                      padding:0;
                      vertical-align:top;
                      text-align:left;
                      font-family:Arial,Helvetica,sans-serif;
                      font-size:8pt;
                      mso-ansi-font-size:8pt;
                      mso-bidi-font-size:8pt;
                      line-height:9pt;
                      mso-line-height-rule:exactly;
                      color:#333333;
                      word-break:normal;
                      overflow-wrap:normal;
                    "
                  >
                    <span
                      style="
                        font-family:Arial,Helvetica,sans-serif;
                        font-size:8pt;
                        mso-ansi-font-size:8pt;
                        mso-bidi-font-size:8pt;
                        line-height:9pt;
                        mso-line-height-rule:exactly;
                        color:#333333;
                      "
                    >
                      <strong
                        style="
                          font-family:Arial,Helvetica,sans-serif;
                          font-size:8pt;
                          mso-ansi-font-size:8pt;
                          mso-bidi-font-size:8pt;
                          line-height:9pt;
                          mso-line-height-rule:exactly;
                          font-weight:700;
                          color:#333333;
                        "
                      >
                        Confidentiality Notice:
                      </strong>
                      This email message, including any attachments, is for the
                      sole use of the intended recipient(s) and may contain
                      confidential and proprietary information. Any unauthorized
                      review, use, disclosure or distribution is prohibited. If
                      you are not the intended recipient, please contact the
                      sender by reply email and destroy all copies of the original
                      message.
                    </span>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
        `;
      }

      const signatureHTML = `
        <table
          width="${SIGNATURE_WIDTH}"
          cellpadding="0"
          cellspacing="0"
          border="0"
          role="presentation"
          style="
            width:${SIGNATURE_WIDTH}px;
            max-width:${SIGNATURE_WIDTH}px;
            border-collapse:collapse;
            border-spacing:0;
            table-layout:fixed;
            font-family:Arial,Helvetica,sans-serif;
            color:#000000;
            background:#ffffff;
          "
        >
          <colgroup>
            <col width="105">
            <col width="18">
            <col width="280">
            <col width="2">
            <col width="10">
            <col width="32">
            <col width="23">
          </colgroup>

          <tr>

            <!-- Logo -->
            <td
              width="105"
              style="
                width:105px;
                padding:0;
                vertical-align:middle;
              "
            >
              <a
                href="https://personandcovey.com"
                target="_blank"
                style="
                  border:0;
                  text-decoration:none;
                "
              >
                <img
                  src="https://cdn.shopify.com/s/files/1/0291/1600/6499/files/pclogo_430x.png"
                  width="105"
                  alt="Person and Covey Logo"
                  style="
                    display:block;
                    width:105px;
                    height:auto;
                    margin:0;
                    padding:0;
                    border:0;
                    outline:none;
                    text-decoration:none;
                  "
                >
              </a>
            </td>

            <!-- Space between logo and information -->
            <td
              width="18"
              style="
                width:18px;
                padding:0;
                font-size:0;
                line-height:0;
              "
            >
              &nbsp;
            </td>

            <!-- Contact information -->
            <td
              width="280"
              style="
                width:280px;
                padding:0;
                vertical-align:middle;
              "
            >
              <table
                width="280"
                cellpadding="0"
                cellspacing="0"
                border="0"
                role="presentation"
                style="
                  width:280px;
                  border-collapse:collapse;
                  border-spacing:0;
                "
              >
                <tr>
                  <td style="
                    padding:0;
                    font-family:Arial,Helvetica,sans-serif;
                    font-size:16px;
                    font-weight:700;
                    line-height:20px;
                    color:#000000;
                    white-space:nowrap;
                  ">
                    ${name}
                  </td>
                </tr>

                <tr>
                  <td style="
                    padding:0 0 10px 0;
                    font-family:Arial,Helvetica,sans-serif;
                    font-size:16px;
                    line-height:20px;
                    color:#000000;
                    white-space:nowrap;
                  ">
                    ${title}
                  </td>
                </tr>

                <tr>
                  <td style="
                    padding:0;
                    font-family:Arial,Helvetica,sans-serif;
                    font-size:16px;
                    line-height:20px;
                    color:#000000;
                    white-space:nowrap;
                  ">
                    ${phoneLine}
                  </td>
                </tr>

                ${optionalPhoneRows}

                <tr>
                  <td style="
                    padding:0;
                    font-family:Arial,Helvetica,sans-serif;
                    font-size:16px;
                    line-height:20px;
                    white-space:nowrap;
                  ">
                    <a
                      href="https://personandcovey.com"
                      target="_blank"
                      style="
                        color:#0000ee;
                        text-decoration:underline;
                      "
                    >
                      Personandcovey.com
                    </a>
                  </td>
                </tr>

                <tr>
                  <td style="
                    padding:0;
                    font-family:Arial,Helvetica,sans-serif;
                    font-size:16px;
                    line-height:20px;
                    color:#000000;
                    white-space:nowrap;
                  ">
                    616 Allen Ave. Glendale, CA 91201
                  </td>
                </tr>
              </table>
            </td>

            <!-- Divider -->
            <td
              width="2"
              style="
                width:2px;
                padding:0;
                border-left:2px solid #333333;
                font-size:0;
                line-height:0;
              "
            >
              &nbsp;
            </td>

            <!-- Space between divider and icons -->
            <td
              width="10"
              style="
                width:10px;
                padding:0;
                font-size:0;
                line-height:0;
              "
            >
              &nbsp;
            </td>

            <!-- Social icons -->
            <td
              width="32"
              style="
                width:32px;
                padding:0;
                vertical-align:middle;
              "
            >
              <table
                width="32"
                cellpadding="0"
                cellspacing="0"
                border="0"
                role="presentation"
                style="
                  width:32px;
                  border-collapse:collapse;
                  border-spacing:0;
                "
              >
                <tr>
                  <td style="padding:0 0 8px 0;">
                    <a
                      href="https://www.facebook.com/ShopPersonandCovey/"
                      target="_blank"
                      style="border:0;text-decoration:none;"
                    >
                      <img
                        src="https://cdn.shopify.com/s/files/1/0291/1600/6499/files/610a722c-6f29-53d0-92e1-c230a368d387_430x.png"
                        width="32"
                        height="32"
                        alt="Facebook"
                        style="
                          display:block;
                          width:32px;
                          height:32px;
                          margin:0;
                          padding:0;
                          border:0;
                          outline:none;
                        "
                      >
                    </a>
                  </td>
                </tr>

                <tr>
                  <td style="padding:0 0 8px 0;">
                    <a
                      href="https://www.instagram.com/personandcoveyinc"
                      target="_blank"
                      style="border:0;text-decoration:none;"
                    >
                      <img
                        src="https://cdn.shopify.com/s/files/1/0291/1600/6499/files/148d42bc-2bc3-58ac-9f5e-dbbc4279340f_430x.png"
                        width="32"
                        height="32"
                        alt="Instagram"
                        style="
                          display:block;
                          width:32px;
                          height:32px;
                          margin:0;
                          padding:0;
                          border:0;
                          outline:none;
                        "
                      >
                    </a>
                  </td>
                </tr>

                <tr>
                  <td style="padding:0;">
                    <a
                      href="https://www.tiktok.com/@personandcoveyinc"
                      target="_blank"
                      style="border:0;text-decoration:none;"
                    >
                      <img
                        src="https://cdn.shopify.com/s/files/1/0291/1600/6499/files/aa300f4f-2bd2-5daf-a926-fc3b95ead10f_430x.png"
                        width="32"
                        height="32"
                        alt="TikTok"
                        style="
                          display:block;
                          width:32px;
                          height:32px;
                          margin:0;
                          padding:0;
                          border:0;
                          outline:none;
                        "
                      >
                    </a>
                  </td>
                </tr>
              </table>
            </td>

            <!-- Small right-side space -->
            <td
              width="23"
              style="
                width:23px;
                padding:0;
                font-size:0;
                line-height:0;
              "
            >
              &nbsp;
            </td>
          </tr>

          <!-- Environmental message -->
          <tr>
            <td
              colspan="7"
              width="${SIGNATURE_WIDTH}"
              style="
                width:${SIGNATURE_WIDTH}px;
                padding:20px 0 0 0;
                vertical-align:middle;
              "
            >
              <table
                width="${SIGNATURE_WIDTH}"
                cellpadding="0"
                cellspacing="0"
                border="0"
                role="presentation"
                style="
                  width:${SIGNATURE_WIDTH}px;
                  border-collapse:collapse;
                  border-spacing:0;
                "
              >
                <tr>
                  <td
                    width="34"
                    style="
                      width:34px;
                      padding:0;
                      vertical-align:middle;
                    "
                  >
                    <img
                      src="https://cdn.shopify.com/s/files/1/0291/1600/6499/files/recycling_430x.png"
                      width="22"
                      height="22"
                      alt="Recycle"
                      style="
                        display:block;
                        width:22px;
                        height:22px;
                        margin:0;
                        padding:0;
                        border:0;
                        outline:none;
                      "
                    >
                  </td>

                  <td
                    width="436"
                    style="
                      width:436px;
                      padding:0;
                      font-family:Arial,Helvetica,sans-serif;
                      font-size:16px;
                      line-height:22px;
                      color:#000000;
                      vertical-align:middle;
                      white-space:nowrap;
                    "
                  >
                    Please consider the environment before printing this email
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          ${confidentialityRow}
        </table>
      `;

      document.getElementById("signatureOutput").innerHTML =
        signatureHTML;
    }

    async function copySignature() {
      const signatureElement =
        document.getElementById("signatureOutput");

      const signatureHTML = signatureElement.innerHTML;
      const signatureText = signatureElement.innerText;

      if (!signatureHTML.trim()) {
        alert("Please generate a signature first.");
        return;
      }

      if (
        navigator.clipboard &&
        window.ClipboardItem
      ) {
        const htmlBlob = new Blob(
          [signatureHTML],
          { type: "text/html" }
        );

        const textBlob = new Blob(
          [signatureText],
          { type: "text/plain" }
        );

        try {
          await navigator.clipboard.write([
            new ClipboardItem({
              "text/html": htmlBlob,
              "text/plain": textBlob
            })
          ]);

          alert("Signature copied with formatting!");
        } catch (error) {
          fallbackCopy(signatureElement);
        }
      } else {
        fallbackCopy(signatureElement);
      }
    }

    function fallbackCopy(element) {
      const range = document.createRange();
      range.selectNodeContents(element);

      const selection = window.getSelection();

      selection.removeAllRanges();
      selection.addRange(range);

      try {
        const copied = document.execCommand("copy");

        if (!copied) {
          throw new Error("Copy command failed.");
        }

        alert("Signature copied!");
      } catch (error) {
        alert(
          "Copy failed. Please highlight the signature and press Ctrl+C."
        );
      }

      selection.removeAllRanges();
    }

    generateSignature();
  </script>

</body>
</html>
